    vot_nominal:  "https://www.cdep.ro/pls/steno/evote2015.data?idv={vot_id}"
    steno_home:   "https://www.cdep.ro/pls/steno/steno2015.home?idl=1"

  senat:
    agenda: "https://www.senat.ro/AgendaSenat.aspx"

email:
  smtp_server: "smtp.gmail.com"
  smtp_port:   465
  use_ssl:     true
  sender:      ""        # setat din env: GMAIL_USER
  password:    ""        # setat din env: GMAIL_APP_PASSWORD
  recipient:   ""        # setat din env: EMAIL_RECIPIENT

praguri:
  minim_articole_partid: 5
  alerta_disidenta:      10.0   # procent
  alerta_absenta:        20.0   # % absenti = alarma
  bootstrap_n:           500
  ci_nivel:              0.95
  max_articole_sursa:    40

partide:
  PSD:   {bloc: "stanga",         gov: true,  grup_camera: 86}
  PNL:   {bloc: "dreapta",        gov: true,  grup_camera: 56}
  USR:   {bloc: "centru-dreapta", gov: true,  grup_camera: 52}
  AUR:   {bloc: "nationalist",    gov: false, grup_camera: 62}
  UDMR:  {bloc: "minoritar",      gov: true,  grup_camera: 21}
  SOS:   {bloc: "extrema-dr",     gov: false, grup_camera: 5}
  POT:   {bloc: "populist",       gov: false, grup_camera: 19}
  REPER: {bloc: "centru",         gov: false, grup_camera: 7}

